global:
  scrape_interval: 15s

scrape_configs:
  - job_name: api
    metrics_path: /metrics/
    static_configs:
      - targets:
          - api:8000

  - job_name: bot
    metrics_path: /metrics
    static_configs:
      - targets:
          - bot:8002

  - job_name: worker
    metrics_path: /metrics
    static_configs:
      - targets:
          - worker:8001
